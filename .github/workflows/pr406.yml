name: pr406

on:
  pull_request_target:
    types: [opened, reopened, synchronize, edited]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: pr406-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr406:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Run pr406
        id: pr406
        uses: ./
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          config_path: .github/pr406.yml

      - name: Emit report
        run: |
          printf '%s\n' '${{ steps.pr406.outputs.report_json }}'
